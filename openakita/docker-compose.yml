services:
  openakita:
    build: .
    container_name: openakita
    restart: unless-stopped
    ports:
      - "18900:18900"
    volumes:
      - ./data:/app/data
      - ./identity:/app/identity
      - ./skills:/app/skills
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=18900
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18900/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  livekit:
    image: livekit/livekit-server:latest
    container_name: openakita-livekit
    command: --dev --bind 0.0.0.0
    restart: unless-stopped
    ports:
      - "7880:7880"          # HTTP signaling
      - "7881:7881"          # TCP RTC
      - "7882:7882/udp"      # UDP RTC
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
